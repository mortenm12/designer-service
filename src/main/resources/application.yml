spring:
  application:
    name: designer-service

  threads:
    virtual:
      enabled: true

  data:
    mongodb:
      uuid-representation: standard

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:9000}
    internal-secret: ${INTERNAL_SECRET:dev-secret-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    dk.tinker.designer: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: false

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-binding-errors: never
