spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/designerdb
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

permission-lib:
  auth-service-url: http://localhost:9000
  service-api-key: ${PERMISSION_LIB_API_KEY:local-dev-key}

management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.data.mongodb: DEBUG
